<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>ProCCD Cam</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <!-- iOS "Add to Home Screen" support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ProCCD" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- hidden pipeline elements -->
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="gl"></canvas>

  <main>
    <!-- mode switch -->
    <div class="modebar">
      <button id="modePhoto" class="mode">Photo</button>
      <button id="modeVideo" class="mode active">Video</button>
      <button id="modeBooth" class="mode">Booth</button>
    </div>

    <!-- the visible, recorded surface -->
    <canvas id="view"></canvas>
    <div id="timer" hidden>● 00:00</div>
    <div id="zoom" hidden>1.0×</div>
    <div id="status"></div>

    <div class="controls">
      <button id="mute"  class="chip label" title="Mute mic">mic</button>
      <button id="record" class="rec" title="Record"><span></span></button>
      <button id="flip"  class="chip label" title="Flip camera">flip</button>
    </div>

    <div class="controls sub">
      <button id="stamp" class="chip label" title="Toggle date/time">date</button>
      <button id="bgBtn" class="chip label" title="Change background">bg</button>
      <label class="slider">look
        <input id="intensity" type="range" min="0" max="1" step="0.01" value="1" />
      </label>
    </div>

    <!-- background picker strip (thumbnails injected by app.js) -->
    <div id="bgPanel"></div>
  </main>

  <!-- photo-booth overlays -->
  <div id="count" hidden>3</div>
  <div id="flash" hidden></div>

  <!-- post-capture preview (photo or video) -->
  <div id="result" class="sheet">
    <video id="resultVideo" controls playsinline hidden></video>
    <img id="resultImage" alt="captured photo" hidden />
    <div class="sheet-actions">
      <button id="discard" class="chip">Retake</button>
      <button id="decorate" class="chip">Decorate</button>
      <button id="save" class="rec-save">Save</button>
    </div>
    <p class="hint">tap the preview (or anywhere) to go back to the camera</p>
  </div>

  <!-- decorate editor: photo on a card + stickers -->
  <div id="editor">
    <div class="ed-bar">
      <button id="edBack" class="chip">←</button>
      <span class="ed-title">decorate</span>
      <button id="edSave" class="rec-save">Save</button>
    </div>
    <div id="edWrap"><div id="stage"></div></div>
    <div class="ed-tabs">
      <button id="tabStk" class="ed-tab active">stickers</button>
      <button id="tabBg" class="ed-tab">background</button>
    </div>
    <div id="trayStk" class="ed-tray"></div>
    <div id="trayBg" class="ed-tray" hidden></div>
    <p class="hint">drag to move · pinch or corner-drag to resize &amp; rotate · × to remove</p>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
